<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santorini - Bauhaus Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg style="display:none;">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
        </filter>
    </svg>
    <div class="grain-overlay"></div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="start-modal">
            <img src="assets/Start.png" alt="Screen" id="modal-image" class="full-start-image" tabindex="0">
        </div>
    </div>

    <div class="game-container">
        <div class="game-info">
            <h1>SANTORINI</h1>
            <p class="status-text sr-only" id="game-status" aria-live="polite"></p>
        </div>
        <div class="board" id="game-board" role="grid" aria-label="Santorini board, 5 by 5"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
